services:
  - type: web
    name: line-family-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 2 -b 0.0.0.0:$PORT --chdir scripts webhook:app
    envVars:
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REFRESH_TOKEN
        sync: false
      - key: FAMILY_SHEET_ID
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: POINTS_THRESHOLD
        value: '5'
