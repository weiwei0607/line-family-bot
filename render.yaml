services:
  - type: web
    name: line-family-bot
    runtime: python
    pythonVersion: "3.11"
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 2 -b 0.0.0.0:$PORT app:app
    envVars:
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REFRESH_TOKEN
        sync: false
      - key: FAMILY_SHEET_ID
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: POINTS_THRESHOLD
        value: '5'
      - key: LINE_GROUP_ID
        sync: false
      - key: RAPIDAPI_KEY
        sync: false
      - key: NASA_API_KEY
        sync: false
      - key: TMDB_API_KEY
        sync: false
      - key: APININJAS_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: RENDER_EXTERNAL_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: ABSTRACT_KEY
        sync: false
