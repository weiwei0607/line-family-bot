name: Daily Family Reminder

on:
  schedule:
    - cron: '0 22 * * *'  # 06:00 CST (UTC+8，前一天 22:00 UTC)
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger daily push
        run: |
          curl -s -X POST "${{ secrets.RENDER_APP_URL }}/daily_push" \
            -H "Authorization: Bearer ${{ secrets.FAMILY_LINE_CHANNEL_SECRET }}" \
            --fail
