name: Daily Family Reminder

on:
  schedule:
    - cron: '30 22 * * *'  # 06:30 CST (UTC+8，前一天 22:30 UTC)
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger daily push
        run: |
          curl -s -X POST "${{ secrets.RENDER_APP_URL }}/daily_push" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 90 \
            --retry 2 --retry-delay 15 \
            -w "\nHTTP %{http_code}" \
            || echo "Daily push failed (Render may be cold-starting)"
