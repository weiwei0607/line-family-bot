name: Daily Family Reminder

on:
  schedule:
    - cron: '0 22 * * *'  # 06:00 CST (UTC+8，前一天 22:00 UTC)
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install google-auth google-auth-oauthlib google-api-python-client requests
      - run: python scripts/daily_reminder.py
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.FAMILY_LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_GROUP_ID: ${{ secrets.FAMILY_LINE_GROUP_ID }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          FAMILY_SHEET_ID: ${{ secrets.FAMILY_SHEET_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          POINTS_THRESHOLD: '5'
