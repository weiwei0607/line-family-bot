name: Check Time-based Reminders

on:
  schedule:
    - cron: '2,12,22,32,42,52 * * * *'  # every 10 min, offset +2
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python scripts/run_check_reminders.py
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.FAMILY_LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_CHANNEL_SECRET: ${{ secrets.FAMILY_LINE_CHANNEL_SECRET }}
          LINE_GROUP_ID: ${{ secrets.FAMILY_LINE_GROUP_ID }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          FAMILY_SHEET_ID: ${{ secrets.FAMILY_SHEET_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
