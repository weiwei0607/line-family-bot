name: Check Time-based Reminders

on:
  schedule:
    - cron: '2,12,22,32,42,52 * * * *'  # every 10 min, offset +2
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger reminder check
        run: |
          curl -s -X POST "${{ secrets.RENDER_APP_URL }}/check_reminders" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 90 \
            --retry 2 --retry-delay 15 \
            -w "\nHTTP %{http_code}" \
            || echo "Reminder check failed (Render may be cold-starting)"
