name: Check Time-based Reminders

on:
  schedule:
    - cron: '*/10 * * * *'  # every 10 minutes
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger reminder check
        run: |
          curl -s -X POST "${{ secrets.RENDER_APP_URL }}/check_reminders" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --fail
