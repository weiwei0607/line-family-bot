name: Keep Alive

on:
  schedule:
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping bots
        run: |
          curl -sf "https://line-family-bot-ump0.onrender.com/health" -o /dev/null || echo "Family bot unreachable"
          curl -sf "https://weiwei-line-bot.onrender.com/health" -o /dev/null || echo "Group bot unreachable"
          curl -sf "https://tutoring-bot.onrender.com/health" -o /dev/null || echo "Tutoring bot unreachable"
