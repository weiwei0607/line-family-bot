name: Weekly Book Recommendation

on:
  schedule:
    - cron: '0 23 * * 5'  # 週六 07:00 CST (UTC+8，週五 23:00 UTC)
  workflow_dispatch:

jobs:
  recommend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests line-bot-sdk
      - run: python scripts/weekly_book_recommend.py
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.FAMILY_LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_GROUP_ID: ${{ secrets.FAMILY_LINE_GROUP_ID }}
